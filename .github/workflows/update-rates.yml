name: Update Exchange Rates

# 매일 KST 09:00 (UTC 00:00) 에 실행
# 공개 레포에서 60일 동안 push가 없으면 GitHub이 스케줄 워크플로를
# 비활성화할 수 있어요. 주기적으로 가격 데이터를 업데이트하면 이 문제는 자연히 해결됩니다.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 수동 실행도 지원

jobs:
  update-rates:
    name: Fetch rates and regenerate JSON
    runs-on: ubuntu-latest
    permissions:
      contents: write # 자동 커밋을 위해 필요

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 환율을 가져오고 JSON을 재생성. 네트워크 오류 시 캐시로 폴백되므로
      # 실패해도 빌드는 망가지지 않음 — 단 로그에 경고가 남음.
      - name: Fetch exchange rates
        run: pnpm run fetch-rates

      - name: Regenerate services.json
        run: pnpm run generate

      # 변경 사항이 있을 때만 커밋 (rates.json + services.json)
      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/.cache/rates.json src/data/generated/services.json public/sitemap.xml public/robots.txt

          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: update exchange rates ${DATE}"
            git push
          fi
