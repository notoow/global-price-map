name: Validate Data

on:
  push:
    paths:
      - "data/**"
      - "src/lib/schema.ts"
  pull_request:
    paths:
      - "data/**"
      - "src/lib/schema.ts"

jobs:
  validate:
    name: Validate YAML price facts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate data/raw/*.yml
        run: pnpm run validate
